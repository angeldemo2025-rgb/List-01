<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario PRO QR</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
}

.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}

.card{
  background:#1e293b;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  cursor:pointer;
}

input,button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
}

button{
  background:#22c55e;
  color:white;
}

.itemRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
}

.qtyInput{
  width:80px;
  text-align:center;
  border:none;
  border-radius:6px;
  padding:6px;
}

.smallBtn{
  width:auto;
  padding:6px 8px;
  margin-left:5px;
  background:#334155;
  border:none;
  border-radius:6px;
  color:white;
}

#fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#22c55e;
  font-size:30px;
  color:white;
  border:none;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

#modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
}

#modalBox{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  width:90%;
}
</style>
</head>

<body>

<div class="container">

<h2>📦 Inventario PRO QR</h2>

<div id="home">
  <input id="newList" placeholder="Nueva lista">
  <button onclick="createList()">➕ Crear lista</button>

  <div id="lists"></div>
</div>

<div id="detail" style="display:none;">

  <button onclick="back()">⬅ Volver</button>

  <h3 id="title"></h3>

  <button onclick="shareList()" style="background:#3b82f6;">
    📤 Compartir
  </button>

  <canvas id="qr"></canvas>

  <div id="items"></div>
</div>

</div>

<button id="fab" onclick="openModal()">+</button>

<div id="modal">
  <div id="modalBox">

    <h3>Artículo</h3>

    <input id="itemName" placeholder="Nombre">
    <input id="itemQty" type="number" placeholder="Cantidad">

    <button onclick="saveItem()">Guardar</button>
    <button onclick="closeModal()">Cancelar</button>

  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBpWDSAOYjkaJCSjpkzcIy2PuPKCLvwGWE",
  authDomain: "inventario-app-bf9af.firebaseapp.com",
  projectId: "inventario-app-bf9af",
  storageBucket: "inventario-app-bf9af.firebasestorage.app",
  messagingSenderId: "737450804732",
  appId: "1:737450804732:web:1e9ae74a1d9e8ecd2c1e79"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let selectedId = null;
let data = null;
let editIndex = null;

let modo = new URLSearchParams(location.search).get("modo") || "creador";

/* ---------------- LISTAS ---------------- */

window.createList = async ()=>{
  let name = document.getElementById("newList").value;
  if(!name) return;

  await addDoc(collection(db,"listas"),{
    nombre:name,
    items:[]
  });

  loadLists();
};

async function loadLists(){
  let cont = document.getElementById("lists");
  cont.innerHTML="";

  let snap = await getDocs(collection(db,"listas"));

  snap.forEach(d=>{
    cont.innerHTML += `
    <div class="card" onclick="openList('${d.id}')">
      📁 ${d.data().nombre}
    </div>`;
  });
}

/* ---------------- OPEN ---------------- */

window.openList = async (id)=>{
  selectedId = id;

  let snap = await getDoc(doc(db,"listas",id));
  data = snap.data();

  document.getElementById("home").style.display="none";
  document.getElementById("detail").style.display="block";

  document.getElementById("title").innerText = data.nombre;

  generateQR();
  renderItems();
};

/* ---------------- QR ---------------- */

function generateQR(){
  let url = location.origin + location.pathname + "?id=" + selectedId + "&modo=view";

  QRCode.toCanvas(document.getElementById("qr"), url, {
    width:180
  });
}

/* ---------------- RENDER ---------------- */

function renderItems(){
  let cont = document.getElementById("items");
  cont.innerHTML="";

  data.items.forEach((it,i)=>{
    cont.innerHTML += `
    <div class="itemRow">

      <div style="flex:1;">
        <b>${it.nombre}</b>
      </div>

      <input class="qtyInput"
        type="number"
        value="${it.cantidad}"
        onchange="updateQty(${i},this.value)"
      >

    </div>`;
  });
}

/* ---------------- BACK FIX 100% ---------------- */

window.back = ()=>{
  selectedId = null;
  data = null;
  editIndex = null;

  document.getElementById("detail").style.display="none";
  document.getElementById("home").style.display="block";
  document.getElementById("items").innerHTML="";
};

/* ---------------- SHARE PRO ---------------- */

window.shareList = ()=>{

  let base = location.origin + location.pathname;
  let url = base + "?id=" + selectedId + "&modo=view";

  let wa = "https://wa.me/?text=" + encodeURIComponent("📦 Inventario: " + url);
  let ms = "https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(url);

  let box = document.createElement("div");

  box.style = `
    position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,0.6);
    display:flex;align-items:center;justify-content:center;
    z-index:9999;
  `;

  box.innerHTML = `
    <div style="background:#1e293b;padding:15px;border-radius:12px;width:90%;">
      <h3>📤 Compartir</h3>

      <button onclick="window.open('${wa}','_blank')" style="background:#25D366;">WhatsApp</button>
      <button onclick="window.open('${ms}','_blank')" style="background:#1877F2;">Messenger</button>
      <button onclick="navigator.clipboard.writeText('${url}');alert('Copiado')">Copiar link</button>
      <button onclick="this.parentElement.parentElement.remove()" style="background:red;">Cerrar</button>

    </div>
  `;

  document.body.appendChild(box);
};

/* ---------------- SAVE QTY ---------------- */

window.updateQty = async (i,val)=>{
  data.items[i].cantidad = Number(val);

  await updateDoc(doc(db,"listas",selectedId),{
    items:data.items
  });
};

/* INIT */
loadLists();

</script>

</body>
</html>
