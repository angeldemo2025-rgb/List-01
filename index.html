<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
}

.container{max-width:500px;margin:auto;padding:15px;}

h2{text-align:center;}

.card{
  background:#1e293b;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

input,button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
}

button{
  background:#22c55e;
  color:white;
  cursor:pointer;
}

.row{
  display:flex;
  gap:10px;
  align-items:center;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
}

.qty{width:80px;text-align:center;}

#fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:65px;
  height:65px;
  border-radius:50%;
  font-size:30px;
  background:#22c55e;
  color:white;
  border:none;
  box-shadow:0 10px 20px rgba(0,0,0,0.4);
  display:none;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.15);}
  100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="container">

<h2>📦 INVENTORY</h2>

<div id="home">
  <input id="newList" placeholder="Nueva lista">
  <button onclick="createList()">➕ Crear lista</button>
  <div id="lists"></div>
</div>

<div id="detail" style="display:none;">

  <button onclick="back()">⬅ Volver</button>

  <h3 id="title"></h3>

  <canvas id="qr"></canvas>

  <button onclick="share()">📤 Share</button>

  <div id="items"></div>
</div>

</div>

<button id="fab" onclick="addItem()">＋</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, getDoc, updateDoc, deleteDoc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBpWDSAOYjkaJCSjpkzcIy2PuPKCLvwGWE",
  authDomain: "inventario-app-bf9af.firebaseapp.com",
  projectId: "inventario-app-bf9af",
  storageBucket: "inventario-app-bf9af.firebasestorage.app",
  messagingSenderId: "737450804732",
  appId: "1:737450804732:web:1e9ae74a1d9e8ecd2c1e79"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentId = null;
let currentData = null;

const params = new URLSearchParams(location.search);
const modo = params.get("modo") || "creador";

const isCreator = modo === "creador";
const isFill = modo === "fill";
const isView = modo === "view";

/* ---------------- FAB ---------------- */
window.onload = ()=>{
  document.getElementById("fab").style.display = isCreator ? "block" : "none";
};

/* ---------------- CREATE LIST ---------------- */
window.createList = async ()=>{

  if(!isCreator) return;

  let name = document.getElementById("newList").value;
  if(!name) return;

  await addDoc(collection(db,"listas"),{
    nombre:name,
    items:[]
  });

  load();
};

/* ---------------- LOAD ---------------- */
async function load(){

  let cont=document.getElementById("lists");
  cont.innerHTML="";

  let snap=await getDocs(collection(db,"listas"));

  snap.forEach(d=>{
    cont.innerHTML+=`
    <div class="card">
      📁 ${d.data().nombre}
      <button onclick="openList('${d.id}')">Abrir</button>
    </div>`;
  });
}

/* ---------------- OPEN ---------------- */
window.openList = async (id)=>{

  currentId = id;

  let snap = await getDoc(doc(db,"listas",id));
  currentData = snap.data();

  if(!currentData.items) currentData.items = [];

  document.getElementById("home").style.display="none";
  document.getElementById("detail").style.display="block";

  document.getElementById("title").innerText = currentData.nombre;

  QRCode.toCanvas(document.getElementById("qr"),
    location.origin + location.pathname + "?id="+id+"&modo=view",
    {width:150}
  );

  render();
};

/* ---------------- RENDER ---------------- */
function render(){

  let cont=document.getElementById("items");
  cont.innerHTML="";

  if(!currentData.items) currentData.items=[];

  currentData.items.forEach((it,i)=>{

    cont.innerHTML+=`
    <div class="row">

      <div style="flex:1">${it.nombre||""}</div>

      <input class="qty"
        type="number"
        value="${it.cantidad||0}"
        ${isView ? "disabled":""}
        onchange="updateQty(${i},this.value)">

    </div>`;
  });

  // ✍️ FILL MODE (5 slots)
  if(isFill){

    for(let i=0;i<5;i++){

      let it=currentData.items[i]||{nombre:"",cantidad:0};

      cont.innerHTML+=`
      <div class="row">

        <input value="${it.nombre}"
          oninput="autoSave(${i},this.value,'name')">

        <input class="qty"
          type="number"
          value="${it.cantidad}"
          oninput="autoSave(${i},this.value,'qty')">

      </div>`;
    }
  }
}

/* ---------------- UPDATE QTY ---------------- */
window.updateQty = async (i,val)=>{

  if(isView) return;

  currentData.items[i].cantidad = Number(val);

  await updateDoc(doc(db,"listas",currentId),{
    items: currentData.items
  });
};

/* ---------------- AUTO SAVE ---------------- */
window.autoSave = async (i,val,type)=>{

  if(isView) return;

  if(!currentData.items[i]){
    currentData.items[i]={nombre:"",cantidad:0};
  }

  if(type==="name") currentData.items[i].nombre=val;
  if(type==="qty") currentData.items[i].cantidad=Number(val);

  await updateDoc(doc(db,"listas",currentId),{
    items: currentData.items
  });
};

/* ---------------- ADD ITEM (+) ---------------- */
window.addItem = async ()=>{

  if(!isCreator) return;

  let name = prompt("Artículo:");
  let qty = prompt("Cantidad:");

  if(!name) return;

  currentData.items.push({
    nombre:name,
    cantidad:Number(qty||0)
  });

  await updateDoc(doc(db,"listas",currentId),{
    items: currentData.items
  });

  render();
};

/* ---------------- SHARE (FIXED) ---------------- */
window.share = ()=>{

  if(!currentId){
    alert("Abre una lista primero");
    return;
  }

  const base = location.origin + location.pathname;

  const view = `${base}?id=${currentId}&modo=view`;
  const fill = `${base}?id=${currentId}&modo=fill`;

  const wa = (u)=>"https://wa.me/?text="+encodeURIComponent("📦 Inventory: "+u);

  const box=document.createElement("div");

  box.style="position:fixed;inset:0;background:#0008;display:flex;align-items:center;justify-content:center";

  box.innerHTML=`
  <div style="background:#1e293b;padding:15px;border-radius:12px;width:90%">

    <button onclick="window.open('${wa(fill)}')">WhatsApp FILL</button>
    <button onclick="window.open('${wa(view)}')">WhatsApp VIEW</button>

    <button onclick="this.parentElement.parentElement.remove()">Cerrar</button>

  </div>`;

  document.body.appendChild(box);
};

/* ---------------- BACK ---------------- */
window.back = ()=>{

  currentId=null;
  currentData=null;

  document.getElementById("detail").style.display="none";
  document.getElementById("home").style.display="block";
};

/* INIT */
load();

</script>
</body>
</html>
