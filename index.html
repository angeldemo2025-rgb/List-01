<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario PRO FINAL</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
}

.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}

.card{
  background:#1e293b;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  cursor:pointer;
}

input,button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
}

button{
  background:#22c55e;
  color:white;
}

.itemRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
}

.qtyInput{
  width:80px;
  text-align:center;
  border:none;
  border-radius:6px;
  padding:6px;
}

#fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#22c55e;
  font-size:30px;
  color:white;
  border:none;
}
</style>
</head>

<body>

<div class="container">

<h2>📦 Inventario PRO FINAL</h2>

<div id="home">
  <input id="newList" placeholder="Nueva lista">
  <button onclick="createList()">➕ Crear lista</button>

  <div id="lists"></div>
</div>

<div id="detail" style="display:none;">

  <button onclick="back()">⬅ Volver</button>

  <h3 id="title"></h3>

  <canvas id="qrCanvas" style="margin:10px 0;"></canvas>

  <button onclick="shareList()" style="background:#3b82f6;">
    📤 Compartir
  </button>

  <div id="items"></div>
</div>

</div>

<button id="fab" onclick="openModal()">+</button>

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);align-items:center;justify-content:center;">
  <div style="background:#1e293b;padding:15px;border-radius:12px;width:90%;">
    <h3>Artículo</h3>

    <input id="itemName" placeholder="Nombre">
    <input id="itemQty" type="number" placeholder="Cantidad">

    <button onclick="addItem()">Guardar</button>
    <button onclick="closeModal()">Cancelar</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBpWDSAOYjkaJCSjpkzcIy2PuPKCLvwGWE",
  authDomain: "inventario-app-bf9af.firebaseapp.com",
  projectId: "inventario-app-bf9af",
  storageBucket: "inventario-app-bf9af.firebasestorage.app",
  messagingSenderId: "737450804732",
  appId: "1:737450804732:web:1e9ae74a1d9e8ecd2c1e79"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let selectedId = null;
let data = null;

const params = new URLSearchParams(location.search);
const modo = params.get("modo") || "creador";

const canEdit = modo === "creador";
const canFill = modo === "creador" || modo === "fill";

/* ---------------- LISTAS ---------------- */

window.createList = async ()=>{
  let name = document.getElementById("newList").value;
  if(!name) return;

  await addDoc(collection(db,"listas"),{
    nombre:name,
    items:[]
  });

  loadLists();
};

async function loadLists(){
  let cont = document.getElementById("lists");
  cont.innerHTML="";

  let snap = await getDocs(collection(db,"listas"));

  snap.forEach(d=>{
    cont.innerHTML += `
    <div class="card" onclick="openList('${d.id}')">
      📁 ${d.data().nombre}
    </div>`;
  });
}

/* ---------------- OPEN ---------------- */

window.openList = async (id)=>{

  selectedId = id;

  let snap = await getDoc(doc(db,"listas",id));
  data = snap.data();

  if(!data.items) data.items = [];

  document.getElementById("home").style.display="none";
  document.getElementById("detail").style.display="block";

  document.getElementById("title").innerText = data.nombre;

  generateQR();
  renderItems();
};

/* ---------------- QR ---------------- */

function generateQR(){

  let url = location.origin + location.pathname + "?id=" + selectedId + "&modo=view";

  QRCode.toCanvas(document.getElementById("qrCanvas"), url, {
    width:180
  });
}

/* ---------------- RENDER ---------------- */

function renderItems(){

  let cont = document.getElementById("items");
  cont.innerHTML="";

  if(modo === "fill"){

    for(let i=0;i<5;i++){

      let it = data.items[i] || {nombre:"",cantidad:0};

      cont.innerHTML += `
      <div class="itemRow">

        <input placeholder="Artículo"
          value="${it.nombre}"
          oninput="autoSave(${i}, this.value, 'name')"
        >

        <input class="qtyInput"
          type="number"
          value="${it.cantidad}"
          oninput="autoSave(${i}, this.value, 'qty')"
        >

      </div>`;
    }

  } else {

    data.items.forEach((it,i)=>{

      cont.innerHTML += `
      <div class="itemRow">

        <div style="flex:1;"><b>${it.nombre}</b></div>

        <input class="qtyInput"
          type="number"
          value="${it.cantidad}"
          onchange="updateQty(${i},this.value)"
        >

      </div>`;
    });
  }
}

/* ---------------- SECURITY ---------------- */

window.autoSave = async (i,value,type)=>{

  if(!canFill) return;

  if(!data.items[i]) data.items[i] = {nombre:"",cantidad:0};

  if(type === "name") data.items[i].nombre = value;
  if(type === "qty") data.items[i].cantidad = Number(value);

  await updateDoc(doc(db,"listas",selectedId),{
    items:data.items
  });
};

window.addItem = async ()=>{

  if(!canEdit) return;

  let name = document.getElementById("itemName").value;
  let qty = document.getElementById("itemQty").value;

  data.items.push({ nombre:name, cantidad:Number(qty) });

  await updateDoc(doc(db,"listas",selectedId),{
    items:data.items
  });

  closeModal();
  renderItems();
};

window.updateQty = async (i,val)=>{

  if(!canFill) return;

  data.items[i].cantidad = Number(val);

  await updateDoc(doc(db,"listas",selectedId),{
    items:data.items
  });
};

/* ---------------- BACK ---------------- */

window.back = ()=>{

  selectedId = null;
  data = null;

  document.getElementById("detail").style.display="none";
  document.getElementById("home").style.display="block";
  document.getElementById("items").innerHTML="";
};

/* ---------------- SHARE PRO ---------------- */

window.shareList = ()=>{

  let base = location.origin + location.pathname;

  let viewURL = `${base}?id=${selectedId}&modo=view`;
  let fillURL = `${base}?id=${selectedId}&modo=fill`;
  let creatorURL = `${base}?id=${selectedId}&modo=creador`;

  const wa = (u)=> "https://wa.me/?text=" + encodeURIComponent("📦 Inventario: " + u);
  const ms = (u)=> "https://www.messenger.com/share?link=" + encodeURIComponent(u);

  let box = document.createElement("div");

  box.style = `
    position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,0.6);
    display:flex;align-items:center;justify-content:center;
    z-index:9999;
  `;

  box.innerHTML = `
    <div style="background:#1e293b;padding:15px;border-radius:12px;width:90%;">
      <h3>📤 Compartir por rol</h3>

      <button onclick="window.open('${wa(viewURL)}','_blank')" style="background:#25D366;">WhatsApp VIEW</button>
      <button onclick="window.open('${ms(viewURL)}','_blank')" style="background:#1877F2;">Messenger VIEW</button>

      <hr>

      <button onclick="window.open('${wa(fillURL)}','_blank')" style="background:#25D366;">WhatsApp FILL</button>
      <button onclick="window.open('${ms(fillURL)}','_blank')" style="background:#1877F2;">Messenger FILL</button>

      <hr>

      <button onclick="navigator.clipboard.writeText('${creatorURL}');alert('Copiado CREATOR')">
        Copiar CREATOR
      </button>

      <button onclick="this.parentElement.parentElement.remove()" style="background:red;">Cerrar</button>
    </div>
  `;

  document.body.appendChild(box);
};

/* MODAL */
window.openModal = ()=> document.getElementById("modal").style.display="flex";
window.closeModal = ()=> document.getElementById("modal").style.display="none";

/* INIT */
loadLists();

</script>

</body>
</html>
