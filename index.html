<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory PRO</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
}

.container{max-width:500px;margin:auto;padding:15px;}

.card{
  background:#1e293b;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

input,button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
}

button{
  background:#22c55e;
  color:white;
}

/* 🔥 BOTÓN + ANIMADO */
#fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:65px;
  height:65px;
  border-radius:50%;
  font-size:30px;
  background:#22c55e;
  color:white;
  border:none;
  box-shadow:0 10px 20px rgba(0,0,0,0.4);
  animation:pulse 1.5s infinite;
  display:none;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.15);}
  100%{transform:scale(1);}
}

.row{
  display:flex;
  gap:10px;
  align-items:center;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
}

.qty{width:80px;text-align:center;}
</style>
</head>

<body>

<div class="container">

<h2>📦 INVENTORY</h2>

<div id="home">
  <input id="newList" placeholder="Nueva lista">
  <button onclick="createList()">➕ Crear lista</button>
  <div id="lists"></div>
</div>

<div id="detail" style="display:none;">

  <button onclick="back()">⬅ Volver</button>

  <h3 id="title"></h3>

  <canvas id="qr"></canvas>

  <button onclick="share()">📤 Share</button>

  <div id="items"></div>
</div>

</div>

<!-- 🔥 BOTÓN + -->
<button id="fab" onclick="openAdd()">＋</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, getDoc, updateDoc, deleteDoc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBpWDSAOYjkaJCSjpkzcIy2PuPKCLvwGWE",
  authDomain: "inventario-app-bf9af.firebaseapp.com",
  projectId: "inventario-app-bf9af",
  storageBucket: "inventario-app-bf9af.firebasestorage.app",
  messagingSenderId: "737450804732",
  appId: "1:737450804732:web:1e9ae74a1d9e8ecd2c1e79"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let id=null;
let data=null;

const params=new URLSearchParams(location.search);
const modo=params.get("modo")||"creador";

const isCreator=modo==="creador";
const isFill=modo==="fill";
const isView=modo==="view";

/* ---------------- FAB CONTROL ---------------- */
window.onload=()=>{
  const fab=document.getElementById("fab");

  if(isCreator){
    fab.style.display="block";
  }else{
    fab.style.display="none";
  }
};

/* ---------------- LISTAS ---------------- */

window.createList=async()=>{

  if(!isCreator) return;

  let name=document.getElementById("newList").value;
  if(!name) return;

  await addDoc(collection(db,"listas"),{
    nombre:name,
    items:[]
  });

  load();
};

async function load(){

  let cont=document.getElementById("lists");
  cont.innerHTML="";

  let snap=await getDocs(collection(db,"listas"));

  snap.forEach(d=>{
    cont.innerHTML+=`
    <div class="card">
      📁 ${d.data().nombre}
      <button onclick="openList('${d.id}')">Abrir</button>
    </div>`;
  });
}

/* ---------------- OPEN ---------------- */

window.openList=async(idList)=>{

  id=idList;

  let snap=await getDoc(doc(db,"listas",id));
  data=snap.data();

  document.getElementById("home").style.display="none";
  document.getElementById("detail").style.display="block";

  document.getElementById("title").innerText=data.nombre;

  QRCode.toCanvas(document.getElementById("qr"),
    location.origin+location.pathname+"?id="+id+"&modo=view",
    {width:150}
  );

  render();
};

/* ---------------- RENDER ---------------- */

function render(){

  let cont=document.getElementById("items");
  cont.innerHTML="";

  if(!data.items) data.items=[];

  // 👀 view + creator
  data.items.forEach((it,i)=>{

    cont.innerHTML+=`
    <div class="row">

      <div style="flex:1">${it.nombre||""}</div>

      <input class="qty"
        type="number"
        value="${it.cantidad||0}"
        ${isView?"disabled":""}
        onchange="updateQty(${i},this.value)">

    </div>`;
  });

  // ✍️ fill 5 slots
  if(isFill){

    for(let i=0;i<5;i++){

      let it=data.items[i]||{nombre:"",cantidad:0};

      cont.innerHTML+=`
      <div class="row">

        <input value="${it.nombre}"
          oninput="auto(${i},this.value,'name')">

        <input class="qty"
          type="number"
          value="${it.cantidad}"
          oninput="auto(${i},this.value,'qty')">

      </div>`;
    }
  }
}

/* ---------------- ADD ITEM (FAB) ---------------- */

window.openAdd=async()=>{

  if(!isCreator) return;

  let name=prompt("Artículo:");
  let qty=prompt("Cantidad:");

  if(!name) return;

  data.items.push({
    nombre:name,
    cantidad:Number(qty||0)
  });

  await updateDoc(doc(db,"listas",id),{
    items:data.items
  });

  render();
};

/* ---------------- UPDATE ---------------- */

window.updateQty=async(i,val)=>{

  if(isView) return;

  data.items[i].cantidad=Number(val);

  await updateDoc(doc(db,"listas",id),{
    items:data.items
  });
};

/* ---------------- FILL ---------------- */

window.auto=async(i,val,type)=>{

  if(!isFill && !isCreator) return;

  if(!data.items[i]) data.items[i]={nombre:"",cantidad:0};

  if(type==="name") data.items[i].nombre=val;
  if(type==="qty") data.items[i].cantidad=Number(val);

  await updateDoc(doc(db,"listas",id),{
    items:data.items
  });
};

/* ---------------- BACK ---------------- */

window.back=()=>location.reload();

/* INIT */
load();

</script>

</body>
</html>
